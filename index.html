<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absen Piket Malam LPSE</title>

<style>

body{
  font-family:Arial;
  background:#f4f6f9;
  padding:20px;
}

.container{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.masuk{
  background:#28a745;
}

.pulang{
  background:#dc3545;
}

video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.status{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  color:#007bff;
}

button:disabled{
  background:#999 !important;
  cursor:not-allowed;
  opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h2>ABSEN PIKET MALAM LPSE</h2>

<div class="status" id="statusJam"></div>

<input
  type="text"
  id="nama"
  placeholder="Masukkan Nama">

<video id="video" autoplay playsinline></video>

<button
  id="btnMasuk"
  class="masuk"
  onclick="absenMasuk()">
Absen Masuk
</button>

<button
  id="btnPulang"
  class="pulang"
  onclick="absenPulang()">
Absen Pulang
</button>

</div>

<script>

// =========================
// URL WEB APP APPS SCRIPT
// =========================

const URL_SCRIPT =
"https://script.google.com/macros/s/AKfycbwEcfPe_5vGBbz7TjKl2Wexnvzo3lOKGYPljSzvam6o31hXTKixBEqB0H4sDzDhrs34iA/exec";

// =========================
// KOORDINAT KANTOR
// =========================

const KANTOR_LAT = -7.3244239;
const KANTOR_LNG = 108.3313482;

// =========================
// RADIUS ABSEN
// =========================

const MAX_RADIUS = 50;

// =========================
// TEST MODE
// true  = bebas jam & lokasi
// false = aturan normal aktif
// =========================

const TEST_MODE = false;

// =========================

const video =
document.getElementById("video");

// =========================
// AKTIFKAN KAMERA
// =========================

navigator.mediaDevices.getUserMedia({
  video:true
})
.then(stream=>{
  video.srcObject = stream;
});

// =========================

updateStatusJam();

setInterval(updateStatusJam,1000);

// =========================
// UPDATE STATUS JAM
// =========================

function updateStatusJam(){

  const status =
    document.getElementById(
      'statusJam'
    );

  const btnMasuk =
    document.getElementById(
      'btnMasuk'
    );

  const btnPulang =
    document.getElementById(
      'btnPulang'
    );

  const inputNama =
    document.getElementById(
      'nama'
    );

  // =========================
  // MODE TEST
  // =========================

  if(TEST_MODE){

    status.innerHTML =
      'MODE TEST AKTIF';

    btnMasuk.disabled = false;
    btnPulang.disabled = false;
    inputNama.disabled = false;

    return;
  }

  // =========================
  // MODE NORMAL
  // =========================

  if(cekJamMasuk()){

    status.innerHTML =
      'Waktu Absen Masuk Sedang Aktif';

    btnMasuk.disabled = false;
    btnPulang.disabled = true;

    inputNama.disabled = false;

  }

  else if(cekJamPulang()){

    status.innerHTML =
      'Waktu Absen Pulang Sedang Aktif';

    btnMasuk.disabled = true;
    btnPulang.disabled = false;

    inputNama.disabled = false;

  }

  else{

    status.innerHTML =
      'Di luar jam absensi';

    btnMasuk.disabled = true;
    btnPulang.disabled = true;

    inputNama.disabled = true;

  }

}

// =========================
// CEK JAM MASUK
// 18:00 - 23:59
// =========================

function cekJamMasuk(){

  const now = new Date();

  const menit =
    now.getHours()*60+
    now.getMinutes();

  return menit >= 1080 &&
         menit <= 1439;
}

// =========================
// CEK JAM PULANG
// 03:00 - 07:30
// =========================

function cekJamPulang(){

  const now = new Date();

  const menit =
    now.getHours()*60+
    now.getMinutes();

  return menit >= 180 &&
         menit <= 450;
}

// =========================
// AMBIL LOKASI
// =========================

async function ambilLokasi(){

  return new Promise((resolve,reject)=>{

    navigator.geolocation.getCurrentPosition(

      position=>{

        resolve({
          latitude:
            position.coords.latitude,

          longitude:
            position.coords.longitude
        });

      },

      error=>{
        reject(error);
      }

    );

  });

}

// =========================
// AMBIL FOTO
// =========================

function ambilFoto(){

  if(video.videoWidth === 0){
    return "";
  }

  const canvas =
    document.createElement("canvas");

  canvas.width = 320;
  canvas.height = 240;

  const ctx =
    canvas.getContext("2d");

  ctx.drawImage(
    video,
    0,
    0,
    320,
    240
  );

  return canvas.toDataURL(
    "image/jpeg",
    0.3
  );
}

// =========================
// HITUNG JARAK
// =========================

function hitungJarak(lat1,lng1,lat2,lng2){

  const R = 6371e3;

  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;

  const Δφ =
    (lat2-lat1) * Math.PI/180;

  const Δλ =
    (lng2-lng1) * Math.PI/180;

  const a =

    Math.sin(Δφ/2) *
    Math.sin(Δφ/2)

    +

    Math.cos(φ1) *
    Math.cos(φ2) *

    Math.sin(Δλ/2) *
    Math.sin(Δλ/2);

  const c =

    2 *
    Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    );

  return R * c;
}

// =========================
// KIRIM DATA
// =========================

async function kirimData(aksi){

  try{

    const nama =
      document.getElementById("nama").value;

    if(nama === ""){

      alert("Nama wajib diisi");

      return;
    }

    // =========================
    // AMBIL LOKASI
    // =========================

    const lokasi =
      await ambilLokasi();
	  
	  // =========================
    // VALIDASI RADIUS ABSEN
    // =========================
    if(!TEST_MODE) { // Cek jarak jika tidak dalam Test Mode
      const jarak = hitungJarak(
        KANTOR_LAT, 
        KANTOR_LNG, 
        lokasi.latitude, 
        lokasi.longitude
      );

      // Jika jarak lebih dari MAX_RADIUS (50 M), hentikan proses
      if(jarak > MAX_RADIUS) {
        alert("Gagal! Anda berada di luar area kantor. Jarak Anda saat ini: " + Math.round(jarak) + " meter.");
        return; 
      }
    }

    // =========================
    // AMBIL FOTO
    // =========================

    const foto =
  ambilFoto();
  
    // =========================
    // KIRIM DATA
    // =========================
const response =
    await fetch(URL_SCRIPT,{

      method:"POST",

      headers:{
    "Content-Type":
    "text/plain;charset=utf-8"
  },

      body:JSON.stringify({

        nama:nama,
        aksi:aksi,

        latitude:
          lokasi.latitude,

        longitude:
          lokasi.longitude,

        foto:foto

      })

    });

const hasil =
  await response.text();

alert(hasil);
    //alert(
      //"Absen Berhasil"
    //);

    //document.getElementById(
      //"nama"
    //).value = "";

  }

  catch(error){

    console.log(error);

    alert(
      "Gagal kirim data: " +
      error
    );

  }

}

// =========================
// BUTTON
// =========================

function absenMasuk(){

  kirimData("masuk");

}

function absenPulang(){

  kirimData("pulang");

}

</script>

</body>
</html>
